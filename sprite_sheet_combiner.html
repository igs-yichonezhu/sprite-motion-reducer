<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sprite Sheet 合併器</title>
  <style>
    :root {
      --ink:#171717; --muted:#68645f; --paper:#f7f3ea; --panel:#fffdf7;
      --line:#d7cec0; --accent:#e13d2f; --teal:#106b68; --gold:#e2a52e;
      --shadow:0 18px 60px rgba(38,31,22,.14);
      font-family:"Segoe UI","Noto Sans TC",sans-serif;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; color:var(--ink);
      background:linear-gradient(90deg,rgba(23,23,23,.035) 1px,transparent 1px),linear-gradient(rgba(23,23,23,.035) 1px,transparent 1px),var(--paper);
      background-size:28px 28px;
    }
    button,input { font:inherit; }
    button,.button-link {
      border:1px solid var(--line); border-radius:8px; padding:10px 14px;
      background:white; color:var(--ink); font-weight:700; cursor:pointer; text-decoration:none;
    }
    button:hover,.button-link:hover { border-color:var(--teal); }
    button:disabled { cursor:not-allowed; opacity:.42; }
    .secondary { color:white; background:var(--teal); border-color:var(--teal); }
    .ghost { background:transparent; }
    .page { width:min(1500px,100%); margin:auto; padding:24px; }
    .topbar { display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:20px; }
    h1 { margin:0 0 6px; font-size:clamp(28px,4vw,42px); line-height:1; }
    .subtitle { margin:0; color:var(--muted); line-height:1.6; }
    .layout { display:grid; grid-template-columns:minmax(340px,440px) minmax(0,1fr); gap:18px; align-items:start; }
    .stack { display:grid; gap:18px; }
    .panel { min-width:0; overflow:hidden; border:1px solid var(--line); border-radius:10px; background:var(--panel); box-shadow:var(--shadow); }
    .panel-head { display:flex; justify-content:space-between; align-items:center; gap:14px; padding:14px 16px; border-bottom:1px solid var(--line); }
    .panel-title { font-weight:800; }
    .status { color:var(--muted); font-size:13px; text-align:right; overflow-wrap:anywhere; }
    .panel-body { padding:16px; }
    .dropzone { display:grid; place-items:center; gap:10px; padding:28px 18px; border:2px dashed var(--line); border-radius:10px; background:rgba(226,165,46,.08); text-align:center; cursor:pointer; }
    .dropzone.dragover { border-color:var(--teal); background:rgba(16,107,104,.09); }
    .dropzone strong { font-size:17px; }
    .dropzone span { color:var(--muted); font-size:13px; }
    #sheetFiles { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
    .sheet-list { display:grid; gap:12px; margin-top:14px; }
    .sheet-card { display:grid; grid-template-columns:112px minmax(0,1fr); gap:12px; padding:10px; border:1px solid var(--line); border-radius:9px; background:white; }
    .sheet-thumb {
      width:112px; height:86px; object-fit:contain; border-radius:6px; background-color:#29251f;
      background-image:linear-gradient(45deg,rgba(255,255,255,.08) 25%,transparent 25%),linear-gradient(-45deg,rgba(255,255,255,.08) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(255,255,255,.08) 75%),linear-gradient(-45deg,transparent 75%,rgba(255,255,255,.08) 75%); background-size:16px 16px;
    }
    .sheet-details { min-width:0; display:grid; gap:8px; }
    .sheet-name { font-weight:800; overflow-wrap:anywhere; }
    .sheet-meta { color:var(--muted); font-size:12px; }
    .grid-controls { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    label { display:grid; gap:4px; color:var(--muted); font-size:11px; font-weight:700; }
    input[type="number"] { width:100%; min-width:0; padding:7px 8px; border:1px solid var(--line); border-radius:7px; color:var(--ink); background:var(--panel); }
    .card-actions { display:flex; flex-wrap:wrap; gap:6px; }
    .card-actions button { padding:6px 9px; font-size:12px; }
    .settings-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }
    .summary { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
    .metric { padding:12px; border:1px solid var(--line); border-radius:8px; text-align:center; }
    .metric b { display:block; color:var(--teal); font-size:22px; }
    .metric span { color:var(--muted); font-size:11px; }
    .preview-grid { display:grid; grid-template-columns:minmax(250px,.8fr) minmax(0,1.2fr); gap:18px; }
    .canvas-wrap {
      display:grid; place-items:center; min-height:320px; padding:18px; overflow:hidden; background-color:#29251f;
      background-image:linear-gradient(45deg,rgba(255,255,255,.07) 25%,transparent 25%),linear-gradient(-45deg,rgba(255,255,255,.07) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(255,255,255,.07) 75%),linear-gradient(-45deg,transparent 75%,rgba(255,255,255,.07) 75%); background-size:24px 24px; background-position:0 0,0 12px,12px -12px,-12px 0;
    }
    canvas { display:block; width:auto; height:auto; max-width:100%; max-height:68vh; }
    #animationCanvas { max-height:430px; }
    .playbar,.download-bar { display:flex; align-items:center; flex-wrap:wrap; gap:10px; padding:12px 14px; border-top:1px solid var(--line); }
    .playbar input[type="range"] { flex:1; min-width:120px; accent-color:var(--teal); }
    .frame-readout { min-width:74px; color:var(--muted); font-size:12px; text-align:right; }
    .empty-note { padding:24px 10px; color:var(--muted); text-align:center; line-height:1.6; }
    .frame-editor-panel { margin-top:18px; }
    .editor-actions { display:flex; flex-wrap:wrap; gap:8px; }
    .frame-editor { display:grid; grid-template-columns:repeat(auto-fill,minmax(112px,1fr)); gap:10px; padding:14px; }
    .frame-card { min-width:0; overflow:hidden; border:1px solid var(--line); border-radius:8px; background:white; transition:.15s ease; }
    .frame-card.inactive { opacity:.45; background:#eeeae1; }
    .frame-card canvas { cursor:grab; }
    .frame-card.dragging { opacity:.25; }
    .frame-card.drop-before { box-shadow:-6px 0 0 -1px var(--gold),-8px 0 16px rgba(226,165,46,.85); }
    .frame-card.drop-after { box-shadow:6px 0 0 -1px var(--gold),8px 0 16px rgba(226,165,46,.85); }
    .frame-card canvas { width:100%; aspect-ratio:1; object-fit:contain; background-color:#29251f; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; touch-action:none; }
    .frame-card-info { padding:7px 8px 4px; font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .copy-control { display:grid; grid-template-columns:34px minmax(0,1fr) 34px; align-items:center; gap:5px; padding:4px 7px 8px; }
    .copy-control button { padding:5px; line-height:1; font-size:18px; }
    .copy-count { text-align:center; font-weight:800; color:var(--teal); }
    .move-control { display:grid; grid-template-columns:1fr 1fr; gap:5px; padding:0 7px 8px; }
    .move-control button { padding:6px 4px; font-size:11px; }
    .magnifier { position:fixed; inset:0; z-index:1000; display:grid; place-items:center; padding:24px; background:rgba(15,13,11,.82); backdrop-filter:blur(4px); }
    .magnifier[hidden] { display:none; }
    .magnifier-card { display:grid; gap:10px; max-width:min(90vw,760px); max-height:90vh; padding:14px; border:1px solid rgba(255,255,255,.24); border-radius:12px; background:#24211d; box-shadow:0 24px 80px rgba(0,0,0,.45); }
    .magnifier canvas { width:auto; height:auto; max-width:calc(90vw - 28px); max-height:calc(90vh - 76px); background-color:#29251f; }
    .magnifier-label { color:white; font-size:13px; text-align:center; overflow-wrap:anywhere; }
    @media(max-width:1050px) { .layout,.preview-grid { grid-template-columns:1fr; } }
    @media(max-width:620px) {
      .page { padding:14px; } .topbar { flex-direction:column; } .settings-grid,.summary { grid-template-columns:1fr; }
      .sheet-card { grid-template-columns:86px minmax(0,1fr); } .sheet-thumb { width:86px; height:72px; } .canvas-wrap { min-height:240px; padding:10px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>Sprite Sheet 合併器</h1>
        <p class="subtitle">匯入多張連續圖，自動切格、移除透明空格、串接播放，再輸出同一張包圖。</p>
      </div>
      <a class="button-link ghost" href="./index.html">← 回到影片抽幀工具</a>
    </header>

    <div class="layout">
      <div class="stack">
        <section class="panel">
          <div class="panel-head"><div class="panel-title">1. 匯入包圖</div><div id="sourceStatus" class="status">尚未匯入</div></div>
          <div class="panel-body">
            <label id="dropzone" class="dropzone" for="sheetFiles">
              <strong>選擇或拖入多張 PNG</strong>
              <span>如 reduced_sheet_4x2.png 會自動辨識為 4 欄 × 2 列</span>
            </label>
            <input id="sheetFiles" type="file" accept="image/png,image/webp" multiple>
            <div id="sheetList" class="sheet-list"><div class="empty-note">匯入後可調整每張圖的欄列與播放順序。</div></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><div class="panel-title">2. 合併設定</div><div id="outputStatus" class="status">等待影格</div></div>
          <div class="panel-body">
            <div class="settings-grid">
              <label>輸出欄數<input id="outputCols" type="number" min="1" max="32" value="4"></label>
              <label>播放 FPS<input id="previewFps" type="number" min="1" max="60" value="8"></label>
              <label>格子間距<input id="outputPadding" type="number" min="0" max="64" value="0"></label>
            </div>
            <div class="summary">
              <div class="metric"><b id="sheetCount">0</b><span>包圖數</span></div>
              <div class="metric"><b id="frameCount">0</b><span>總影格</span></div>
              <div class="metric"><b id="durationCount">0.00s</b><span>播放長度</span></div>
            </div>
          </div>
        </section>
      </div>

      <div class="preview-grid">
        <section class="panel">
          <div class="panel-head"><div class="panel-title">連續播放</div><div id="animationInfo" class="status">0 / 0</div></div>
          <div class="canvas-wrap"><canvas id="animationCanvas" width="512" height="512"></canvas></div>
          <div class="playbar">
            <button id="prevFrame" class="ghost" disabled>上一格</button>
            <button id="playPause" class="secondary" disabled>播放</button>
            <button id="nextFrame" class="ghost" disabled>下一格</button>
            <input id="scrubber" type="range" min="0" max="0" value="0" disabled>
            <span id="frameReadout" class="frame-readout">0 / 0</span>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><div class="panel-title">合併包圖預覽</div><div id="atlasInfo" class="status">尚未產生</div></div>
          <div class="canvas-wrap"><canvas id="atlasCanvas" width="1" height="1"></canvas></div>
          <div class="download-bar">
            <button id="downloadPng" class="secondary" disabled>下載合併 PNG</button>
            <button id="downloadJson" class="secondary" disabled>下載播放 JSON</button>
            <button id="clearAll" class="ghost" disabled>全部清除</button>
          </div>
        </section>
      </div>
    </div>

    <section class="panel frame-editor-panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">3. 調整每格張數</div>
          <div class="status" style="text-align:left">拖曳時依發光直線插入前方或後方；減到 0 會從播放與輸出移除。</div>
        </div>
        <div class="editor-actions">
          <button id="removeAdjacentDuplicates" class="ghost" disabled>移除相鄰重複</button>
          <button id="resetFrameCounts" class="ghost" disabled>全部重設為 1 張</button>
          <button id="resetFrameOrder" class="ghost" disabled>回復原始順序</button>
        </div>
      </div>
      <div id="frameEditor" class="frame-editor"><div class="empty-note">匯入包圖後會在這裡顯示每一格。</div></div>
    </section>
  </div>
  <canvas id="analysisCanvas" hidden></canvas>
  <div id="magnifier" class="magnifier" hidden aria-hidden="true" role="dialog" aria-label="影格放大預覽">
    <div class="magnifier-card">
      <canvas id="magnifierCanvas"></canvas>
      <div id="magnifierLabel" class="magnifier-label"></div>
    </div>
  </div>

  <script>
    const $ = selector => document.querySelector(selector);
    const sheetFiles = $("#sheetFiles");
    const dropzone = $("#dropzone");
    const sheetList = $("#sheetList");
    const sourceStatus = $("#sourceStatus");
    const outputStatus = $("#outputStatus");
    const outputCols = $("#outputCols");
    const previewFps = $("#previewFps");
    const outputPadding = $("#outputPadding");
    const animationCanvas = $("#animationCanvas");
    const atlasCanvas = $("#atlasCanvas");
    const analysisCanvas = $("#analysisCanvas");
    const prevFrame = $("#prevFrame");
    const playPause = $("#playPause");
    const nextFrame = $("#nextFrame");
    const scrubber = $("#scrubber");
    const downloadPng = $("#downloadPng");
    const downloadJson = $("#downloadJson");
    const clearAll = $("#clearAll");
    const frameEditor = $("#frameEditor");
    const removeAdjacentDuplicates = $("#removeAdjacentDuplicates");
    const resetFrameCounts = $("#resetFrameCounts");
    const resetFrameOrder = $("#resetFrameOrder");
    const magnifier = $("#magnifier");
    const magnifierCanvas = $("#magnifierCanvas");
    const magnifierLabel = $("#magnifierLabel");

    let sheets = [];
    let frames = [];
    let currentFrame = 0;
    let playing = false;
    let playbackTimer = 0;
    let nextSheetId = 1;
    let nextSequenceItemId = 1;
    let sequenceOrder = [];
    let pointerDrag = null;

    sheetFiles.addEventListener("change", () => importFiles([...sheetFiles.files]));
    dropzone.addEventListener("dragover", event => { event.preventDefault(); dropzone.classList.add("dragover"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
    dropzone.addEventListener("drop", event => {
      event.preventDefault(); dropzone.classList.remove("dragover");
      importFiles([...event.dataTransfer.files].filter(file => file.type.startsWith("image/")));
    });

    sheetList.addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const index = sheets.findIndex(sheet => sheet.id === Number(button.dataset.id));
      if (index < 0) return;
      if (button.dataset.action === "up" && index > 0) { [sheets[index - 1], sheets[index]] = [sheets[index], sheets[index - 1]]; resetSequenceOrder(); }
      if (button.dataset.action === "down" && index < sheets.length - 1) { [sheets[index + 1], sheets[index]] = [sheets[index], sheets[index + 1]]; resetSequenceOrder(); }
      if (button.dataset.action === "remove") { URL.revokeObjectURL(sheets[index].url); sheets.splice(index, 1); }
      rebuild();
    });

    sheetList.addEventListener("change", async event => {
      const input = event.target.closest("input[data-grid]");
      if (!input) return;
      const sheet = sheets.find(item => item.id === Number(input.dataset.id));
      if (!sheet) return;
      sheet[input.dataset.grid] = clampInt(input.value, 1, 64, sheet[input.dataset.grid]);
      await analyzeSheet(sheet);
      rebuild();
    });

    [outputCols, outputPadding].forEach(input => input.addEventListener("input", rebuild));
    previewFps.addEventListener("input", () => { updateSummary(); if (playing) startPlayback(); });
    prevFrame.addEventListener("click", () => showFrame(currentFrame - 1));
    nextFrame.addEventListener("click", () => showFrame(currentFrame + 1));
    playPause.addEventListener("click", () => { playing = !playing; playing ? startPlayback() : stopPlayback(); updateControls(); });
    scrubber.addEventListener("input", () => showFrame(Number(scrubber.value)));
    downloadPng.addEventListener("click", () => downloadCanvas(atlasCanvas, "combined_sprite_sheet.png"));
    downloadJson.addEventListener("click", downloadManifest);
    clearAll.addEventListener("click", clearSheets);
    frameEditor.addEventListener("click", event => {
      const zoomButton = event.target.closest("button[data-zoom-sheet]");
      if (zoomButton) {
        showMagnifier(zoomButton);
        return;
      }
      const duplicateButton = event.target.closest("button[data-duplicate-sequence]");
      if (duplicateButton) {
        duplicateSequenceItem(duplicateButton.dataset.duplicateSequence);
        return;
      }
      const button = event.target.closest("button[data-copy-delta]");
      if (!button) return;
      const item = sequenceOrder.find(entry => entry.id === button.dataset.sequenceId);
      if (!item) return;
      item.copies = clampInt(item.copies + Number(button.dataset.copyDelta), 0, 99, item.copies);
      rebuild();
    });
    frameEditor.addEventListener("pointerdown", event => {
      const canvas = event.target.closest("canvas[data-thumb-sheet]");
      if (!canvas || event.button > 0) return;
      const card = canvas.closest(".frame-card[data-sequence-key]");
      pointerDrag = { id:event.pointerId, x:event.clientX, y:event.clientY, key:card.dataset.sequenceKey, card, targetKey:"", insertSide:"", active:false };
      canvas.setPointerCapture(event.pointerId);
    });
    frameEditor.addEventListener("pointermove", event => {
      if (!pointerDrag || pointerDrag.id !== event.pointerId) return;
      if (Math.hypot(event.clientX-pointerDrag.x,event.clientY-pointerDrag.y) <= 8) return;
      pointerDrag.active = true;
      pointerDrag.card.classList.add("dragging");
      frameEditor.querySelectorAll(".drop-before,.drop-after").forEach(item => item.classList.remove("drop-before","drop-after"));
      const target = document.elementFromPoint(event.clientX,event.clientY)?.closest(".frame-card[data-sequence-key]");
      pointerDrag.targetKey = target && target.dataset.sequenceKey !== pointerDrag.key ? target.dataset.sequenceKey : "";
      pointerDrag.insertSide = "";
      if (pointerDrag.targetKey) {
        const bounds = target.getBoundingClientRect();
        pointerDrag.insertSide = event.clientX < bounds.left + bounds.width/2 ? "before" : "after";
        target.classList.add(pointerDrag.insertSide === "before" ? "drop-before" : "drop-after");
      }
    });
    document.addEventListener("pointerup", event => finishPointerDrag(event,true));
    document.addEventListener("pointercancel", event => finishPointerDrag(event,false));
    document.addEventListener("keydown", event => { if (event.key === "Escape") hideMagnifier(); });
    magnifier.addEventListener("click", hideMagnifier);
    resetFrameCounts.addEventListener("click", () => {
      sequenceOrder.forEach(item => { item.copies = 1; });
      rebuild();
    });
    removeAdjacentDuplicates.addEventListener("click", removeDuplicateNeighbors);
    resetFrameOrder.addEventListener("click", () => { resetSequenceOrder(); rebuild(); });

    async function importFiles(files) {
      if (!files.length) return;
      sourceStatus.textContent = `讀取 ${files.length} 張圖片…`;
      for (const file of files) {
        const url = URL.createObjectURL(file);
        try {
          const image = await loadImage(url);
          const grid = inferGrid(file.name, image.naturalWidth, image.naturalHeight);
          const sheet = { id:nextSheetId++, name:file.name, url, image, width:image.naturalWidth, height:image.naturalHeight, cols:grid.cols, rows:grid.rows, slots:[] };
          await analyzeSheet(sheet);
          sheets.push(sheet);
        } catch (error) { URL.revokeObjectURL(url); console.error(error); }
      }
      sheetFiles.value = "";
      rebuild();
    }

    function inferGrid(name, width, height) {
      const match = name.match(/(?:^|[_-])(\d+)x(\d+)(?=\.[^.]+$|[_-]|$)/i);
      if (match) return { cols:clampInt(match[1],1,64,4), rows:clampInt(match[2],1,64,1) };
      const cols = 4;
      return { cols, rows:Math.max(1,Math.round(height/(width/cols))) };
    }

    async function analyzeSheet(sheet) {
      const cellWidth = sheet.width / sheet.cols;
      const cellHeight = sheet.height / sheet.rows;
      const scanWidth = Math.min(64, Math.max(1, Math.round(cellWidth)));
      const scanHeight = Math.min(64, Math.max(1, Math.round(cellHeight)));
      analysisCanvas.width = scanWidth;
      analysisCanvas.height = scanHeight;
      const context = analysisCanvas.getContext("2d", { willReadFrequently:true });
      const slots = [];
      for (let slot = 0; slot < sheet.cols * sheet.rows; slot++) {
        const col = slot % sheet.cols;
        const row = Math.floor(slot / sheet.cols);
        context.clearRect(0,0,scanWidth,scanHeight);
        context.drawImage(sheet.image,col*cellWidth,row*cellHeight,cellWidth,cellHeight,0,0,scanWidth,scanHeight);
        const pixels = context.getImageData(0,0,scanWidth,scanHeight).data;
        if (hasVisiblePixels(pixels)) {
          slots.push({ slot, signature:Array.from(pixels) });
        }
      }
      sheet.slots = slots;
    }

    function hasVisiblePixels(pixels) {
      for (let alpha=3; alpha<pixels.length; alpha+=16) if (pixels[alpha] > 8) return true;
      return false;
    }

    function sourceKey(sheet,entry) { return `${sheet.id}:${entry.slot}`; }
    function createSequenceItem(key,copies=1) { return { id:`sequence-${nextSequenceItemId++}`, key, copies }; }

    function defaultSequenceItems() {
      return sheets.flatMap(sheet => sheet.slots.map(entry => createSequenceItem(sourceKey(sheet,entry))));
    }

    function syncSequenceOrder() {
      const defaults = sheets.flatMap(sheet => sheet.slots.map(entry => sourceKey(sheet,entry)));
      const valid = new Set(defaults);
      sequenceOrder = sequenceOrder.filter(item => valid.has(item.key));
      const present = new Set(sequenceOrder.map(item => item.key));
      defaults.forEach(key => { if (!present.has(key)) sequenceOrder.push(createSequenceItem(key)); });
    }

    function resetSequenceOrder() { sequenceOrder = defaultSequenceItems(); }

    function orderedEntries() {
      syncSequenceOrder();
      const entries = new Map();
      sheets.forEach(sheet => sheet.slots.forEach((entry,sourceOrder) => entries.set(sourceKey(sheet,entry),{sheet,entry,sourceOrder})));
      return sequenceOrder.map(item => ({sequenceItem:item,...entries.get(item.key)})).filter(item => item.sheet);
    }

    function moveSequenceTo(id,targetId,insertSide) {
      syncSequenceOrder();
      const sourceIndex = sequenceOrder.findIndex(item => item.id === id);
      if (sourceIndex < 0) return;
      const [item] = sequenceOrder.splice(sourceIndex,1);
      const targetIndex = sequenceOrder.findIndex(entry => entry.id === targetId);
      const insertIndex = targetIndex + (insertSide === "after" ? 1 : 0);
      sequenceOrder.splice(insertIndex,0,item);
      rebuild();
    }

    function duplicateSequenceItem(id) {
      syncSequenceOrder();
      const index = sequenceOrder.findIndex(item => item.id === id);
      if (index < 0) return;
      sequenceOrder.splice(index+1,0,createSequenceItem(sequenceOrder[index].key,1));
      rebuild();
    }

    function rebuild() {
      stopPlayback();
      frames = orderedEntries().flatMap(({sequenceItem,sheet,entry,sourceOrder}) => {
        const width = sheet.width / sheet.cols;
        const height = sheet.height / sheet.rows;
        return Array.from({length:sequenceItem.copies},(_,copyOrder) => ({
          sequenceItemId:sequenceItem.id,sheet,sourceOrder,copyOrder,slot:entry.slot,col:entry.slot%sheet.cols,row:Math.floor(entry.slot/sheet.cols),width,height
        }));
      });
      currentFrame = Math.min(currentFrame,Math.max(0,frames.length-1));
      renderSheetList(); renderFrameEditor(); renderAtlas(); showFrame(currentFrame); updateSummary(); updateControls();
    }

    function renderSheetList() {
      if (!sheets.length) {
        sheetList.innerHTML = '<div class="empty-note">匯入後可調整每張圖的欄列與播放順序。</div>';
        sourceStatus.textContent = "尚未匯入";
        return;
      }
      sourceStatus.textContent = `${sheets.length} 張包圖，依下列順序播放`;
      sheetList.innerHTML = sheets.map((sheet,index) => `
        <article class="sheet-card">
          <img class="sheet-thumb" src="${sheet.url}" alt="">
          <div class="sheet-details">
            <div><div class="sheet-name">${escapeHtml(sheet.name)}</div><div class="sheet-meta">${sheet.width}×${sheet.height} · 每格 ${Math.round(sheet.width/sheet.cols)}×${Math.round(sheet.height/sheet.rows)} · 偵測 ${sheet.slots.length} 格</div></div>
            <div class="grid-controls">
              <label>欄數<input data-grid="cols" data-id="${sheet.id}" type="number" min="1" max="64" value="${sheet.cols}"></label>
              <label>列數<input data-grid="rows" data-id="${sheet.id}" type="number" min="1" max="64" value="${sheet.rows}"></label>
            </div>
            <div class="card-actions">
              <button class="ghost" data-action="up" data-id="${sheet.id}" ${index===0?"disabled":""}>上移</button>
              <button class="ghost" data-action="down" data-id="${sheet.id}" ${index===sheets.length-1?"disabled":""}>下移</button>
              <button class="ghost" data-action="remove" data-id="${sheet.id}">移除</button>
            </div>
          </div>
        </article>`).join("");
    }

    function renderFrameEditor() {
      const entries = orderedEntries();
      if (!entries.length) {
        frameEditor.innerHTML = '<div class="empty-note">匯入包圖後會在這裡顯示每一格。</div>';
        return;
      }
      frameEditor.innerHTML = entries.map(({sequenceItem,sheet,entry,sourceOrder},index) => `
        <article class="frame-card ${sequenceItem.copies === 0 ? "inactive" : ""}" data-sequence-key="${sequenceItem.id}" title="依發光直線的位置插入前方或後方">
          <canvas data-thumb-sheet="${sheet.id}" data-thumb-slot="${entry.slot}" width="112" height="112"></canvas>
          <div class="frame-card-info" title="${escapeHtml(sheet.name)}">${index + 1}. ${escapeHtml(sheet.name)} · 格 ${sourceOrder + 1}</div>
          <div class="copy-control">
            <button class="ghost" data-copy-delta="-1" data-sequence-id="${sequenceItem.id}" ${sequenceItem.copies === 0 ? "disabled" : ""} aria-label="減少第 ${index + 1} 格">−</button>
            <div class="copy-count">${sequenceItem.copies} 張</div>
            <button class="ghost" data-copy-delta="1" data-sequence-id="${sequenceItem.id}" aria-label="增加第 ${index + 1} 格">＋</button>
          </div>
          <div class="move-control">
            <button class="ghost" data-zoom-sheet="${sheet.id}" data-thumb-slot="${entry.slot}" aria-label="放大第 ${index + 1} 格">🔍 放大</button>
            <button class="ghost" data-duplicate-sequence="${sequenceItem.id}" aria-label="複製第 ${index + 1} 格">複製一張</button>
          </div>
        </article>`).join("");
      window.requestAnimationFrame(drawFrameThumbnails);
    }

    function drawFrameThumbnails() {
      frameEditor.querySelectorAll("canvas[data-thumb-sheet]").forEach(canvas => {
        const sheet = sheets.find(item => item.id === Number(canvas.dataset.thumbSheet));
        const slot = Number(canvas.dataset.thumbSlot);
        if (!sheet) return;
        const width = sheet.width / sheet.cols;
        const height = sheet.height / sheet.rows;
        const context = canvas.getContext("2d");
        context.clearRect(0,0,canvas.width,canvas.height);
        const scale = Math.min(canvas.width/width,canvas.height/height);
        const drawWidth = width*scale;
        const drawHeight = height*scale;
        context.drawImage(sheet.image,(slot%sheet.cols)*width,Math.floor(slot/sheet.cols)*height,width,height,(canvas.width-drawWidth)/2,(canvas.height-drawHeight)/2,drawWidth,drawHeight);
      });
    }

    function finishPointerDrag(event,shouldMove) {
      const drag = pointerDrag;
      pointerDrag = null;
      frameEditor.querySelectorAll(".dragging,.drop-before,.drop-after").forEach(item => item.classList.remove("dragging","drop-before","drop-after"));
      if (shouldMove && drag?.active && drag.targetKey) moveSequenceTo(drag.key,drag.targetKey,drag.insertSide);
    }

    function showMagnifier(canvas) {
      const sheet = sheets.find(item => item.id === Number(canvas.dataset.zoomSheet));
      const slot = Number(canvas.dataset.thumbSlot);
      if (!sheet) return;
      const width = sheet.width / sheet.cols;
      const height = sheet.height / sheet.rows;
      const entryIndex = sheet.slots.findIndex(entry => entry.slot === slot);
      magnifierCanvas.width = Math.round(width);
      magnifierCanvas.height = Math.round(height);
      const context = magnifierCanvas.getContext("2d");
      context.clearRect(0,0,magnifierCanvas.width,magnifierCanvas.height);
      context.drawImage(sheet.image,(slot%sheet.cols)*width,Math.floor(slot/sheet.cols)*height,width,height,0,0,magnifierCanvas.width,magnifierCanvas.height);
      magnifierLabel.textContent = `${sheet.name} · 第 ${entryIndex + 1} 格`;
      magnifier.hidden = false;
      magnifier.setAttribute("aria-hidden","false");
    }

    function hideMagnifier() {
      magnifier.hidden = true;
      magnifier.setAttribute("aria-hidden","true");
    }

    function atlasSettings() {
      return {
        cols:clampInt(outputCols.value,1,32,4), padding:clampInt(outputPadding.value,0,64,0),
        cellWidth:frames.length?Math.ceil(Math.max(...frames.map(frame=>frame.width))):1,
        cellHeight:frames.length?Math.ceil(Math.max(...frames.map(frame=>frame.height))):1
      };
    }

    function renderAtlas() {
      if (!frames.length) {
        atlasCanvas.width=1; atlasCanvas.height=1; $("#atlasInfo").textContent="尚未產生"; outputStatus.textContent="等待影格"; return;
      }
      const settings = atlasSettings();
      const rows = Math.ceil(frames.length/settings.cols);
      const width = settings.cols*settings.cellWidth + Math.max(0,settings.cols-1)*settings.padding;
      const height = rows*settings.cellHeight + Math.max(0,rows-1)*settings.padding;
      atlasCanvas.width=width; atlasCanvas.height=height;
      const context=atlasCanvas.getContext("2d"); context.clearRect(0,0,width,height);
      frames.forEach((frame,order) => {
        const x=(order%settings.cols)*(settings.cellWidth+settings.padding)+(settings.cellWidth-frame.width)/2;
        const y=Math.floor(order/settings.cols)*(settings.cellHeight+settings.padding)+(settings.cellHeight-frame.height)/2;
        context.drawImage(frame.sheet.image,frame.col*frame.width,frame.row*frame.height,frame.width,frame.height,x,y,frame.width,frame.height);
      });
      $("#atlasInfo").textContent=`${settings.cols} 欄 × ${rows} 列 · ${width}×${height}`;
      outputStatus.textContent=`${frames.length} 格已合併`;
    }

    function showFrame(index) {
      if (!frames.length) {
        animationCanvas.width=512; animationCanvas.height=512; animationCanvas.getContext("2d").clearRect(0,0,512,512);
        $("#animationInfo").textContent="0 / 0"; $("#frameReadout").textContent="0 / 0"; return;
      }
      currentFrame=(index+frames.length)%frames.length;
      const frame=frames[currentFrame];
      animationCanvas.width=Math.round(frame.width); animationCanvas.height=Math.round(frame.height);
      const context=animationCanvas.getContext("2d"); context.clearRect(0,0,animationCanvas.width,animationCanvas.height);
      context.drawImage(frame.sheet.image,frame.col*frame.width,frame.row*frame.height,frame.width,frame.height,0,0,animationCanvas.width,animationCanvas.height);
      scrubber.value=String(currentFrame);
      $("#animationInfo").textContent=`${frame.sheet.name} · 第 ${frame.sourceOrder+1} 格`;
      $("#frameReadout").textContent=`${currentFrame+1} / ${frames.length}`;
    }

    function startPlayback() {
      stopPlayback(false); playing=true;
      const delay=1000/clampInt(previewFps.value,1,60,8);
      playbackTimer=window.setTimeout(function tick(){ showFrame(currentFrame+1); playbackTimer=window.setTimeout(tick,delay); },delay);
      updateControls();
    }
    function stopPlayback(reset=true) { window.clearTimeout(playbackTimer); playbackTimer=0; if(reset) playing=false; updateControls(); }

    function removeDuplicateNeighbors() {
      const entries = orderedEntries();
      let previous = null;
      let removed = 0;
      entries.forEach(item => {
        if (item.sequenceItem.copies === 0) return;
        if (previous && signatureDifference(previous.entry.signature,item.entry.signature) < .006) {
          item.sequenceItem.copies = 0;
          removed += 1;
        } else {
          previous = item;
        }
      });
      rebuild();
      outputStatus.textContent = removed ? `已移除 ${removed} 個相鄰重複格` : "沒有找到相鄰重複格";
    }

    function signatureDifference(left,right) {
      if (!left || !right || left.length !== right.length) return 1;
      let difference = 0;
      for (let index=0; index<left.length; index++) difference += Math.abs(left[index]-right[index]);
      return difference/(left.length*255);
    }

    function updateControls() {
      const ready=frames.length>0;
      [prevFrame,nextFrame,playPause].forEach(button=>button.disabled=!ready);
      scrubber.disabled=!ready; scrubber.max=String(Math.max(0,frames.length-1)); playPause.textContent=playing?"暫停":"播放";
      downloadPng.disabled=!ready; downloadJson.disabled=!ready; clearAll.disabled=sheets.length===0;
      removeAdjacentDuplicates.disabled=sheets.length===0;
      resetFrameCounts.disabled=sheets.length===0;
      resetFrameOrder.disabled=sheets.length===0;
    }

    function updateSummary() {
      const fps=clampInt(previewFps.value,1,60,8);
      $("#sheetCount").textContent=String(sheets.length); $("#frameCount").textContent=String(frames.length);
      $("#durationCount").textContent=`${(frames.length/fps).toFixed(2)}s`;
    }

    function buildManifest() {
      const settings=atlasSettings(); const fps=clampInt(previewFps.value,1,60,8);
      return {
        version:1,image:"combined_sprite_sheet.png",columns:settings.cols,rows:Math.ceil(frames.length/settings.cols),
        cell_width:settings.cellWidth,cell_height:settings.cellHeight,padding:settings.padding,fps,loop:true,total_frames:frames.length,
        sources:sheets.map(sheet=>({name:sheet.name,columns:sheet.cols,rows:sheet.rows,detected_frames:sheet.slots.length,output_frames:sequenceOrder.filter(item=>item.key.startsWith(`${sheet.id}:`)).reduce((sum,item)=>sum+item.copies,0)})),
        frames:frames.map((frame,order)=>({order,source:frame.sheet.name,source_frame:frame.sourceOrder,source_slot:frame.slot,x:(order%settings.cols)*(settings.cellWidth+settings.padding),y:Math.floor(order/settings.cols)*(settings.cellHeight+settings.padding),width:settings.cellWidth,height:settings.cellHeight,duration_ms:Math.round(1000/fps)}))
      };
    }

    function downloadManifest() { if(frames.length) downloadBlob(new Blob([JSON.stringify(buildManifest(),null,2)],{type:"application/json"}),"combined_sprite_sheet.json"); }
    function downloadCanvas(canvas,filename) { if(frames.length) canvas.toBlob(blob=>{if(blob) downloadBlob(blob,filename);},"image/png"); }
    function downloadBlob(blob,filename) { const url=URL.createObjectURL(blob); const link=document.createElement("a"); link.href=url; link.download=filename; link.click(); window.setTimeout(()=>URL.revokeObjectURL(url),1000); }
    function clearSheets() { sheets.forEach(sheet=>URL.revokeObjectURL(sheet.url)); sheets=[]; frames=[]; sequenceOrder=[]; nextSequenceItemId=1; currentFrame=0; rebuild(); }
    function loadImage(url) { return new Promise((resolve,reject)=>{ const image=new Image(); image.onload=()=>resolve(image); image.onerror=()=>reject(new Error("圖片讀取失敗")); image.src=url; }); }
    function clampInt(value,min,max,fallback) { const number=Number.parseInt(value,10); return Number.isFinite(number)?Math.min(max,Math.max(min,number)):fallback; }
    function escapeHtml(value) { return value.replace(/[&<>"]/g,character=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[character]); }

    updateSummary(); updateControls();
  </script>
</body>
</html>
